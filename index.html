<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Завдання 1</title>
</head>

<body>

    <div id="block">Привіт</div>
    <button id="btn">Сховати</button>

    <script>
        document.getElementById("btn").onclick = function () {
            document.getElementById("block").style.display = "none";
        };
    </script>

</body>

</html>
